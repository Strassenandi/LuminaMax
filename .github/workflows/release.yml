name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for the release (for example v1.0.1)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Swift version
        run: swift --version

      - name: Build app bundle
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Create distributable archive
        run: |
          ditto -c -k --sequesterRsrc --keepParent LuminaMax.app LuminaMax.app.zip
          shasum -a 256 LuminaMax.app.zip > LuminaMax.app.zip.sha256

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            LuminaMax.app.zip
            LuminaMax.app.zip.sha256
